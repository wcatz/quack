<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>quack</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <h1>quack</h1>
    <div class="duck-frame" id="duck-frame">
      <img id="duck-img" alt="a duck" />
      <div class="loading" id="loading">loading duck...</div>
    </div>
    <div class="controls">
      <button id="btn-new" onclick="fetchDuck()">New Duck</button>
      <button id="btn-find" onclick="findDucks()">Find Ducks</button>
      <div class="filters">
        <button class="filter active" data-filter="" onclick="setFilter(this, '')">All</button>
        <button class="filter" data-filter="image" onclick="setFilter(this, 'image')">Images</button>
        <button class="filter" data-filter="gif" onclick="setFilter(this, 'gif')">GIFs</button>
      </div>
    </div>
    <div class="stats" id="stats"></div>
    <details class="api-docs">
      <summary>API</summary>
      <div class="api-list">
        <div class="api-item">
          <code>GET /api/v1/random</code>
          <span>Random duck (JSON). Params: <code>?type=gif|jpg</code> <code>?redirect=true</code></span>
        </div>
        <div class="api-item">
          <code>GET /api/v1/random/gif</code>
          <span>Random GIF</span>
        </div>
        <div class="api-item">
          <code>GET /api/v1/random/image</code>
          <span>Random image</span>
        </div>
        <div class="api-item">
          <code>GET /api/v1/count</code>
          <span>Collection stats</span>
        </div>
        <div class="api-item">
          <code>POST /api/v1/scrape</code>
          <span>Trigger scrape run</span>
        </div>
      </div>
    </details>
  </div>
  <script src="/app.js"></script>
</body>
</html>
